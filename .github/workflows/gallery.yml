name: Render gallery

on:
  push:
    branches: [main]
    paths:
      - "fractals/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gallery.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gallery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Render gallery
        run: uv run build-all

      - name: Commit gallery if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gallery
          if git diff --cached --quiet; then
            echo "no gallery changes"
          else
            git commit -m "chore(gallery): refresh fractal renders"
            git push
          fi
